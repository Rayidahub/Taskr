<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TASKR — CLI Task Manager</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="shell">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-bracket">[</span>TASKR<span class="logo-bracket">]</span>
      </div>
      <p class="header-sub">your CLI-powered task manager</p>
      <div class="header-stats">
        <span class="stat"><span id="stat-total">0</span> total</span>
        <span class="divider">·</span>
        <span class="stat done-stat"><span id="stat-done">0</span> done</span>
        <span class="divider">·</span>
        <span class="stat pending-stat"><span id="stat-pending">0</span> pending</span>
      </div>
    </header>

    <!-- Notification Banner -->
    <div class="notif-banner" id="notif-banner">
      <span class="notif-icon">🔔</span>
      <span class="notif-text">Enable notifications to get due-time alerts</span>
      <button class="notif-allow" id="notif-allow-btn">Allow</button>
      <button class="notif-dismiss" id="notif-dismiss-btn">✕</button>
    </div>

    <!-- Add Task Card -->
    <div class="add-card">
      <div class="add-row-top">
        <span class="prompt">$</span>
        <input
          id="task-input"
          class="task-input"
          type="text"
          placeholder="Type a task and press Enter or click +"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="add-btn" id="add-btn" aria-label="Add task">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 2v14M2 9h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="add-row-bottom">
        <label class="due-label" for="due-input">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M6.5 3.5v3l2 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          Due:
        </label>
        <input
          id="due-input"
          class="due-input"
          type="datetime-local"
          title="Set a due date and time for this task"
        />
        <span class="due-hint">optional — set notification timing after adding</span>
      </div>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
      <button class="tab active" data-filter="all">All</button>
      <button class="tab" data-filter="pending">Pending</button>
      <button class="tab" data-filter="done">Done</button>
    </div>

    <!-- Task List -->
    <ul class="task-list" id="task-list"></ul>

    <!-- Empty State -->
    <div class="empty-state" id="empty-state" style="display:none">
      <div class="empty-icon">_</div>
      <p>No tasks here.<br/>Add one above to get started.</p>
    </div>

    <footer class="footer">
      <code>task add · list · done · delete · serve</code>
    </footer>

  </div>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
